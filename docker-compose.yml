services:
  # SQL Server Database
  database:
    build:
      context: ./backend
      dockerfile: Dockerfile.db
    container_name: northwind-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "RsmAcademic123!"
      MSSQL_PID: "Developer"
      MSSQL_DATA_DIR: /var/opt/mssql/data
    user: "root"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql/data
    networks:
      - rsm-network
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "RsmAcademic123!", "-Q", "SELECT 1", "-C" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 45s

  # Backend ASP.NET Core API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rsm-backend
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__NorthwindDb: "Server=database,1433;Database=Northwind;User Id=sa;Password=RsmAcademic123!;TrustServerCertificate=True;"
      GoogleMaps__ApiKey: "${GOOGLE_MAPS_API_KEY:-YOUR_GOOGLE_MAPS_API_KEY}"
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - rsm-network
    restart: unless-stopped

  # Frontend Quasar/Vue.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rsm-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - rsm-network
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=http://backend:8080

volumes:
  sqlserver_data:
    driver: local

networks:
  rsm-network:
    driver: bridge
